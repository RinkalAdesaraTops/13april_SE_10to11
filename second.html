<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- direction = left,right,up,down -->
     <!-- behavior="scroll slide alternate" -->
      <!-- scrollamount-speed up
        scrolldelay - speed down  -->
    <!-- <marquee direction="right" behavior="scroll" bgcolor="red" height="300px" width="400px" hspace="50" vspace="30" loop="3" scrolldelay="200">This is text</marquee> -->
    <hr>
    <!-- 3 types of list -->  
     <!-- 1)unorder list-ul -->
      <ul type="disc">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
      </ul>
      <ul type="circle">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
      </ul>
      <ul type="square">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
      </ul>
      <ul type="none">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
      </ul>
      <hr>
      <!-- 2)order list -->
       <ol type="1" start="100" reversed>
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
       </ol>
       <ol type="A" start="6">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
       </ol>
       <ol type="a">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
       </ol>
       <ol type="I">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
       </ol>
       <ol type="i">
        <li>Abc</li>
        <li>xyz</li>
        <li>pqr</li>
       </ol>
       <hr>
       <!-- 3)Description list -->
        <dl>
            <dt>HTML</dt>
            <dd>It stands for Hypertext markup language</dd>
            <dd>jhksgdf sjhdgfjhrgtg df</dd>
        </dl>
</body>
</html>
