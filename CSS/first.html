<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- internal css -->
    <style>
        /* selector - tagname,id,classname */
        /* tagname */
        div{
            color:blue
        }
        /* classname */
        .abc{
            background-color: chartreuse;
        }
        /* id */
        #txt{
            background-color: chocolate;
        }
    </style>
</head>
<body>
    <!-- cascading stylesheet -->
    <!-- 3 types of css - inline,internal,external -->
    <h3 style="color: red;background-color: yellow;font-size: 45px;">Hello</h3>
    <div class="abc">sdjgjdkfhg</div>
    <div id="txt">wuiytbg skjdg</div>
    <button>Add</button>
</body>
</html>
