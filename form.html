<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- method= get & post -->
     <h3>Registration Form</h3>
    <form action="#" method="post">
        <label>Name:</label>
        <input type="text" name="" id="">
        <br><br>
        <label for="">Age:</label>
        <input type="number" name="" id="">
        <br><br>
        <label for="">Email:</label>
        <input type="email" name="" id="">
        <br><br>
        <label for="">Password:</label>
        <input type="password" name="" id="">
        <br><br>
        <label for="">Range:</label>
        <input type="range" name="" id="">
        <br><br>
        <label for="">Gender:</label>
        <input type="radio" name="g1" id="">Male
        <input type="radio" name="g1" id="">Female
        <br><br>
        <label for="">Qualification:</label>
        <input type="checkbox" name="q1" id="">SSC
        <input type="checkbox" name="q1" id="">HSC
        <input type="checkbox" name="q1" id="">Bechlor
        <input type="checkbox" name="q1" id="">Master
        <br><br>
        <label for="">Address:</label>
        <textarea name="" id="" rows="5" cols="30"></textarea>
        <br><br>
        <!-- dropdown button -->
        <label for="">Country</label>
        <select name="" id="">
            <option value="">India</option>
            <option value="">US</option>
            <option value="">UK</option>
            <option value="">Canada</option>
            <option value="">Australia</option>
        </select> 
        <br><br>
        <input type="button" value="Button">
        <input type="submit" value="Save">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
